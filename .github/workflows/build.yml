name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build
        run: xcodebuild -project pdfClaw.xcodeproj -scheme pdfClaw -configuration Release build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

  build-release:
    runs-on: macos-14
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build Release
        run: |
          xcodebuild -project pdfClaw.xcodeproj -scheme pdfClaw -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

      - name: Create DMG
        run: |
          mkdir -p dmg_contents
          cp -R build/Build/Products/Release/pdfClaw.app dmg_contents/
          hdiutil create -volname "pdfClaw" -srcfolder dmg_contents -ov -format UDZO pdfClaw.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: pdfClaw.dmg
          path: pdfClaw.dmg
